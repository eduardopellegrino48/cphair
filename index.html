<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Copenhagen Generator</title>
    <style>
        /* FONT SCHIBSTED GROTESK */
        @import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;700;900&display=swap');

        :root {
            /* Colori di default (Good) - Verranno sovrascritti dal JS */
            --bg-light: #B9F2D9; 
            --bg-dark: #0A8255;
            --font-main: 'Schibsted Grotesk', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #333; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #poster {
            width: 1080px;
            height: 1350px;
            background-color: var(--bg-light);
            color: var(--bg-dark);
            font-family: var(--font-main);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content {
            padding: 60px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            font-size: 32px;
            text-transform: uppercase;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .date-block {
            display: flex;
            flex-direction: column;
        }
        .date-block.right {
            align-items: flex-end;
        }

        .date-num {
            font-size: 260px;
            font-weight: 700;
            line-height: 0.8;
            letter-spacing: -8px;
        }

        .date-text {
            font-size: 90px;
            font-weight: 400;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin-top: 10px;
        }

        .logo-container {
            width: 180px;
            height: 180px;
            background-color: var(--bg-dark);
            /* Qui ho lasciato il tuo nome file esatto! */
            mask: url('Koebenhavnermaerke_RGB_Blaa.svg') no-repeat center / contain;
            -webkit-mask: url('Koebenhavnermaerke_RGB_Blaa.svg') no-repeat center / contain;
        }

        hr {
            border: none;
            border-top: 3px solid var(--bg-dark);
            width: 100%;
            margin: 30px 0;
        }

        .category-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .category-label {
            font-size: 30px;
            font-weight: 400;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .category-value {
            font-size: 150px;
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            text-align: right;
            letter-spacing: -4px;
            max-width: 700px;
            word-wrap: break-word;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .aqi-block {
            display: flex;
            flex-direction: column;
        }

        .aqi-label {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .aqi-value {
            font-size: 220px;
            font-weight: 900;
            line-height: 0.75;
            letter-spacing: -8px;
        }

        .pollutants-table {
            display: grid;
            grid-template-columns: 1fr auto auto;
            row-gap: 15px;
            column-gap: 40px;
            font-size: 34px;
            margin-top: 30px;
            margin-right: 20px;
        }

        .pollutant-name { font-weight: 400; }
        .pollutant-val { font-weight: 700; text-align: right; }
        .pollutant-unit { font-size: 20px; font-weight: 700; margin-top: 8px;}

        .message-banner {
            background-color: var(--bg-dark);
            color: var(--bg-light);
            padding: 60px;
            font-size: 80px;
            font-weight: 400;
            line-height: 1.05;
            letter-spacing: -3px;
        }
    </style>
</head>
<body>

    <div id="poster">
        <div class="content">
            <header>
                <span>Copenhagen Air Quality</span>
                <span id="year">2026</span>
            </header>

            <section class="date-row">
                <div class="date-block">
                    <span class="date-num" id="day-num">18</span>
                    <span class="date-text" id="day-text">WED</span>
                </div>
                
                <div class="logo-container"></div>
                
                <div class="date-block right">
                    <span class="date-num" id="month-num">03</span>
                    <span class="date-text" id="month-text">MARCH</span>
                </div>
            </section>

            <hr>

            <section class="category-row">
                <div class="category-label">AIR QUALITY IS</div>
                <div class="category-value" id="category-value">GOOD</div>
            </section>

            <hr>

            <section class="data-row">
                <div class="aqi-block">
                    <span class="aqi-label">AQI (Air Quality Index):</span>
                    <span class="aqi-value" id="aqi-value">26</span>
                </div>

                <div class="pollutants-table">
                    <div class="pollutant-name">PM2.5</div>
                    <div class="pollutant-val" id="pm25-val">4.5</div>
                    <div class="pollutant-unit">µg/m³</div>

                    <div class="pollutant-name">PM10</div>
                    <div class="pollutant-val" id="pm10-val">12.0</div>
                    <div class="pollutant-unit">µg/m³</div>

                    <div class="pollutant-name">NO₂</div>
                    <div class="pollutant-val" id="no2-val">15.1</div>
                    <div class="pollutant-unit">µg/m³</div>

                    <div class="pollutant-name">O₃</div>
                    <div class="pollutant-val" id="o3-val">64.5</div>
                    <div class="pollutant-unit">µg/m³</div>
                </div>
            </section>
        </div>

        <footer class="message-banner" id="message-text">
            Fresh air day in Copenhagen!
        </footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        const aqi = parseInt(params.get('aqi')) || 26;
        const pm25 = params.get('pm25') || '4.5';
        const pm10 = params.get('pm10') || '12.0';
        const no2 = params.get('no2') || '15.1';
        const o3 = params.get('o3') || '64.5';
        const customMsg = params.get('msg') || '';

        const today = new Date();
        const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        const monthsText = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
        
        document.getElementById('year').textContent = today.getFullYear();
        document.getElementById('day-num').textContent = String(today.getDate()).padStart(2, '0');
        document.getElementById('day-text').textContent = days[today.getDay()];
        document.getElementById('month-num').textContent = String(today.getMonth() + 1).padStart(2, '0');
        document.getElementById('month-text').textContent = monthsText[today.getMonth()];

        document.getElementById('aqi-value').textContent = aqi;
        document.getElementById('pm25-val').textContent = pm25;
        document.getElementById('pm10-val').textContent = pm10;
        document.getElementById('no2-val').textContent = no2;
        document.getElementById('o3-val').textContent = o3;

        let category = "";
        let bgLight = "", bgDark = "";
        let defaultMsg = "";

        if (aqi <= 50) {
            category = "GOOD";
            bgLight = "#B9F2D9"; 
            bgDark = "#0A8255";  
            defaultMsg = "Perfect day for outdoor activities.";
            document.getElementById('category-value').style.fontSize = "150px";
        } else if (aqi <= 100) {
            category = "MODERATE";
            bgLight = "#FFF2B2"; 
            bgDark = "#D49A00";  
            defaultMsg = "Most people can enjoy outdoor activities.";
            document.getElementById('category-value').style.fontSize = "150px";
        } else if (aqi <= 150) {
            category = "UNHEALTHY FOR SENSITIVE GROUPS";
            bgLight = "#FDE0C4"; 
            bgDark = "#D87A2B";  
            defaultMsg = "Sensitive individuals should take it easy outdoors.";
            document.getElementById('category-value').style.fontSize = "95px"; 
            document.getElementById('category-value').style.lineHeight = "0.9";
        } else if (aqi <= 200) {
            category = "UNHEALTHY";
            bgLight = "#FF99AA"; 
            bgDark = "#B41C3C";  
            defaultMsg = "Consider staying indoors.";
            document.getElementById('category-value').style.fontSize = "130px";
        } else if (aqi <= 300) {
            category = "VERY UNHEALTHY";
            bgLight = "#C89DFC"; 
            bgDark = "#6414A4";  
            defaultMsg = "Avoid outdoor activities if possible.";
            document.getElementById('category-value').style.fontSize = "110px";
            document.getElementById('category-value').style.lineHeight = "0.9";
        } else {
            category = "HAZARDOUS";
            bgLight = "#F04C7C"; 
            bgDark = "#740C24";  
            defaultMsg = "Stay indoors and keep windows closed.";
            document.getElementById('category-value').style.fontSize = "130px";
        }

        document.documentElement.style.setProperty('--bg-light', bgLight);
        document.documentElement.style.setProperty('--bg-dark', bgDark);
        document.getElementById('category-value').textContent = category;
        document.getElementById('message-text').textContent = customMsg ? decodeURIComponent(customMsg) : defaultMsg;

    </script>
</body>
</html>
